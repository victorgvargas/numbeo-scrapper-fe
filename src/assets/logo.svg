<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" role="img" aria-labelledby="titleA descA">
  <title id="titleA">Colcalc coin chart logo</title>
  <desc id="descA">Teal coin with three rising bars and upward arrow</desc>
  <rect width="16" height="16" fill="none"/>
  <circle cx="8" cy="8" r="6.2" fill="#0A7A6B"/>
  <!-- bars -->
  <rect x="5" y="8.5" width="1.1" height="3.5" rx="0.2" fill="#ffffff"/>
  <rect x="7" y="6.8" width="1.1" height="5.2" rx="0.2" fill="#ffffff"/>
  <rect x="9" y="5.2" width="1.1" height="6.8" rx="0.2" fill="#ffffff"/>
  <!-- arrow -->
  <path d="M4.5 9.5 L7 7.2 L10.2 4" fill="none" stroke="#fff" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M10 4 L9.2 5.1 M10 4 L11.1 4.4" fill="none" stroke="#fff" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
